# fly.toml app configuration file generated for plugz-live on 2026-04-23T08:55:34-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'plugz-live'
primary_region = 'yyz'

[env]
  HOST = '0.0.0.0'
  HOST_HEADER = 'x-forwarded-host'
  PORT = '8080'
  PORT_HEADER = 'x-forwarded-port'
  PROTOCOL_HEADER = 'x-forwarded-proto'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
